<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDT Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      width: 100%;
      max-width: 640px;
    }
    h1 {
      text-align: center;
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }
    .chat-box {
      background: #1e293b;
      border-radius: 16px;
      border: 1px solid #334155;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
    }
    .chat-messages {
      min-height: 320px;
      max-height: 50vh;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .msg.user {
      align-self: flex-end;
      background: #22c55e;
      color: white;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #334155;
      color: #e2e8f0;
    }
    .chat-input-row {
      display: flex;
      gap: 12px;
      padding: 16px;
      border-top: 1px solid #334155;
    }
    .chat-input-row input {
      flex: 1;
      padding: 14px 18px;
      border: 1px solid #475569;
      border-radius: 10px;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 1rem;
      font-family: inherit;
    }
    .chat-input-row input::placeholder { color: #64748b; }
    .chat-input-row input:focus {
      outline: none;
      border-color: #22c55e;
    }
    .chat-input-row button {
      padding: 14px 24px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
    }
    .chat-input-row button:hover:not(:disabled) { background: #16a34a; }
    .chat-input-row button:disabled { opacity: 0.6; cursor: not-allowed; }
    .admin-link {
      margin-top: 24px;
      text-align: center;
    }
    .admin-link a {
      color: #64748b;
      font-size: 0.875rem;
      text-decoration: none;
    }
    .admin-link a:hover { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MDT Support</h1>
    <p class="subtitle">Ask anything. We’re here to help.</p>

    <div class="chat-box">
      <div class="chat-messages" id="messages"></div>
      <div class="chat-input-row">
        <input type="text" id="input" placeholder="Type your question..." autocomplete="off">
        <button type="button" id="send">Send</button>
      </div>
    </div>

    <p class="admin-link"><a href="/admin">Admin dashboard</a></p>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    let conversationId = null;
    let loading = false;

    function addMsg(role, content) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = content;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function showEmpty() {
      if (messagesEl.querySelectorAll('.msg').length === 0) {
        const p = document.createElement('p');
        p.style.cssText = 'text-align:center;color:#64748b;padding:24px;margin:0;';
        p.textContent = 'Type a message below to get started.';
        messagesEl.appendChild(p);
      }
    }

    function hideEmpty() {
      const p = messagesEl.querySelector('p');
      if (p && !p.classList.contains('msg')) p.remove();
    }

    showEmpty();

    async function send() {
      const text = inputEl.value.trim();
      if (!text || loading) return;

      hideEmpty();
      inputEl.value = '';
      addMsg('user', text);
      const assistantEl = addMsg('assistant', '');
      loading = true;
      sendBtn.disabled = true;

      try {
        const res = await fetch('/api/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            conversationId,
            message: text,
            customerEmail: null
          })
        });

        if (!res.ok || !res.body) {
          assistantEl.textContent = 'Something went wrong. Please try again.';
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let full = '';
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const events = buffer.split('\n\n');
          buffer = events.pop() || '';
          for (const event of events) {
            const line = event.split('\n').find(function(l) { return l.startsWith('data: '); });
            if (!line) continue;
            try {
              const data = JSON.parse(line.slice(6));
              if (data.type === 'text' && data.content != null) {
                full += data.content;
                assistantEl.textContent = full;
                messagesEl.scrollTop = messagesEl.scrollHeight;
              } else if (data.type === 'done' && data.conversationId) {
                conversationId = data.conversationId;
              }
            } catch (_) {}
          }
        }
      } catch (err) {
        assistantEl.textContent = 'Something went wrong. Please try again.';
      } finally {
        loading = false;
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
  </script>
</body>
</html>
