<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDT Support</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #111213;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .brand {
      padding: 1.5rem 0;
      text-align: center;
    }
    .brand h1 { margin: 0; font-size: 1.5rem; font-weight: 600; }
    .brand p { margin: 0.25rem 0 0; font-size: 0.9rem; color: #9ca3af; }
    .container {
      width: 100%;
      max-width: 720px;
      padding: 0 1rem 1rem;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .messages {
      flex: 1;
      min-height: 400px;
      overflow-y: auto;
      padding: 1rem 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message { max-width: 85%; }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }
    .message .bubble {
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      line-height: 1.4;
    }
    .message.user .bubble { background: #1e40af; color: #fff; border-bottom-right-radius: 0.25rem; }
    .message.assistant .bubble { background: #1f2937; border-bottom-left-radius: 0.25rem; }
    .message.assistant .bubble code { background: #374151; padding: 0.15em 0.4em; border-radius: 0.25rem; font-size: 0.9em; }
    .message.assistant .bubble strong { font-weight: 600; }
    .message .typing { color: #9ca3af; font-style: italic; }
    #chat-form {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 0;
      border-top: 1px solid #374151;
    }
    #chat-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #374151;
      border-radius: 0.5rem;
      background: #1f2937;
      color: #e5e5e5;
      font-size: 1rem;
    }
    #chat-input::placeholder { color: #6b7280; }
    #chat-form button {
      padding: 0.75rem 1.25rem;
      background: #1e40af;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-weight: 500;
      cursor: pointer;
    }
    #chat-form button:hover { background: #1d4ed8; }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.5rem 0;
    }
    .chips button {
      padding: 0.5rem 0.75rem;
      background: transparent;
      border: 1px solid #4b5563;
      border-radius: 9999px;
      color: #9ca3af;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .chips button:hover { background: #374151; color: #e5e5e5; }
    .human-link {
      text-align: center;
      padding: 0.75rem 0;
    }
    .human-link a { color: #60a5fa; text-decoration: none; }
    .human-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="brand">
    <h1>MDT Support</h1>
    <p>Ask anything about products, orders, or compatibility</p>
  </div>
  <div class="container">
    <div id="messages" class="messages" role="log"></div>
    <div id="chips" class="chips"></div>
    <form id="chat-form">
      <input id="chat-input" type="text" placeholder="Type a message..." autocomplete="off">
      <button type="submit">Send</button>
    </form>
    <div class="human-link">
      <a href="#" id="talk-to-human">Talk to a human</a>
    </div>
  </div>
  <script src="/chat.js" defer></script>
</body>
</html>
